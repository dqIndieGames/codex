name: local3-minimal-windows-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update.
        required: true
        type: string
      ci_run_id:
        description: rust-ci run id that passed for this commit.
        required: true
        type: string
      target:
        description: Windows Rust target to build.
        required: false
        default: x86_64-pc-windows-msvc
        type: choice
        options:
          - x86_64-pc-windows-msvc
      release_name:
        description: Optional release display name.
        required: false
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: Build minimal Windows package
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ inputs.target }}

      - name: Build codex.exe
        shell: bash
        run: cargo build --target "${{ inputs.target }}" --release --bin codex

      - name: Smoke test codex.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = '${{ inputs.target }}'
          $exe = Join-Path $env:GITHUB_WORKSPACE "codex-rs\target\$target\release\codex.exe"
          if (-not (Test-Path $exe)) {
            throw "Missing built binary: $exe"
          }

          $cargoToml = Get-Content "Cargo.toml" -Raw
          $expectedVersion = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"').Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($expectedVersion)) {
            throw "Failed to read expected version from codex-rs/Cargo.toml"
          }
          $expectedDisplayVersion = "$expectedVersion-local3"

          $version = & $exe --version
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Write-Host $version
          if ($version -notmatch [regex]::Escape($expectedDisplayVersion)) {
            throw "Expected $expectedDisplayVersion version output from $exe, got: $version"
          }

          & $exe --help | Select-Object -First 30
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package codex.exe
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = '${{ inputs.target }}'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $source = Join-Path $env:GITHUB_WORKSPACE "codex-rs\target\$target\release\codex.exe"
          if (-not (Test-Path $source)) {
            throw "Missing built binary: $source"
          }

          $stage = Join-Path $dist "codex-$target"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath $source -Destination (Join-Path $stage 'codex.exe') -Force

          $zipName = "codex-$target-minimal.zip"
          $zip = Join-Path $dist $zipName
          if (Test-Path $zip) {
            Remove-Item -LiteralPath $zip -Force
          }
          Compress-Archive -Path (Join-Path $stage 'codex.exe') -DestinationPath $zip -Force
          "zip_path=dist/$zipName" >> $env:GITHUB_OUTPUT

      - name: Verify CI run
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ci = gh run view "$env:CI_RUN_ID" --repo "$env:GITHUB_REPOSITORY" --json headSha,status,conclusion,workflowName | ConvertFrom-Json
          if ($ci.workflowName -ne 'rust-ci') {
            throw "CI run $env:CI_RUN_ID is workflow $($ci.workflowName), expected rust-ci"
          }
          if ([string]::IsNullOrWhiteSpace($ci.headSha)) {
            throw "Failed to read headSha for CI run $env:CI_RUN_ID"
          }
          if ($ci.status -ne 'completed' -or $ci.conclusion -ne 'success') {
            throw "CI run $env:CI_RUN_ID is $($ci.status)/$($ci.conclusion), expected completed/success"
          }
          if ($ci.headSha -ne $env:TARGET_COMMITISH) {
            throw "CI run headSha $($ci.headSha) does not match target commit $env:TARGET_COMMITISH"
          }
          Write-Host "Verified rust-ci run $env:CI_RUN_ID completed successfully from $env:TARGET_COMMITISH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.release_name || inputs.tag }}
          body: |
            Minimal local3 Windows package generated by GitHub Actions.

            Contents:
            - codex.exe
          files: ${{ steps.package.outputs.zip_path }}
          fail_on_unmatched_files: true
          prerelease: true
